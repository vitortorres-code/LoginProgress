<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>LogInProgress</title>
</head>
<body>
    <main>
        <section class="header"> 
            <div class="image">
                <img src="imagens/logodef.png" alt="">
            </div>          
                <h1>Welcome back</h1>
                <p>Enter with your email and password for login</p>
        </section>
        <form class="formulario" id="form">
            <div class="form-inps">
                <label for="email" id="obrigatorio">E-mail</label>
                <input type="text" id="email" placeholder="Enter E-mail">
            </div>
            <div class="form-inps">
                <label for="password" id="obrigatorio">Password</label>
                <input type="password" id="password" placeholder=" Enter Password">
            </div>
            <div class="btn-erro">
                <p id="erro"></p>
                <button class="login" id="register-loginBtn">Log in</button>
            </div>
            <div class="divider">
                <p>Or authorize with</p>
            </div>
            <button type="button" class="google"><i class="fa-brands fa-google"></i> Google</button>               
        </form>
        <section class="options">
                   
            <div class="forgot-signup">
                <a href="#">Forgot password?</a>
                <p>Don't have an account? <a href="register.html">Sing up</a></p>
            </div>
        </section>   
    </main>
    
    
    <script>

        const form = document.getElementById('form');
        const erro = document.getElementById('erro');

        form.addEventListener("submit", function(event){
            event.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const dadosSalvos = JSON.parse(localStorage.getItem("usuario"));

            if (!dadosSalvos) {
                erro.textContent = "Nenhum usuario cadastrado!";
                return;

            }
            if (email === dadosSalvos.email && password === dadosSalvos.password){
                erro.textContent = "";
                
                window.location.href = "home.html"

            }else{
                erro.textContent = "email ou senha invalidos!";

            }

        });

    </script>
</body>
</html>
