<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>RegisterProgress</title>
</head>
<body>
    <main>
        <section class="header"> 
            <div class="image">
                <img src="imagens/logodef.png" alt="">
            </div>          
                <h1>Create your account</h1>
                <p>Enter your details to get started</p>
        </section>
        <form class="formulario" id="form">
            <div class="form-inps">
                <label for="usuario" id="obrigatorio" >User</label>
                <input type="text" id="user" placeholder="User">
            </div>
            <div class="form-inps">
                <label for="email" id="obrigatorio" >E-mail</label>
                <input type="email" id="email" placeholder="Enter E-mail">
            </div>
            <div class="form-inps">
                <label for="password" id="obrigatorio" >Password</label>
                <input type="password" id="password" placeholder=" Enter Password">
            </div>
            <div class="btn-erro">
                <p id="erro"></p>
                <button type="submit" id="register-loginBtn">Register</button>
            </div>
            <div class="divider">
                <p>Or authorize with</p>
            </div>
            <button type="button" class="google"><i class="fa-brands fa-google"></i> Google</button>               
        </form>
        <section class="options">                   
            <div class="forgot-signup">
                <p>Already have an account? <a href="login.html">Log in</a></p>
            </div>
        </section>   
    </main>

    <script>

        const form = document.getElementById('form');

        form.addEventListener("submit", function(event){

            event.preventDefault();

            const user = document.getElementById('user').value;            
            const email = document.getElementById('email').value;          
            const password = document.getElementById('password').value;

            if ( !user ||!email || !password ){
                erro.textContent = "Preencha todos os campos corretamente!"
                returd;
            }else{
                alert("usuario cadastrado")
            }

            erro.textContent = ""; // limpa o erro

            const dados = {
                user: user,
                email: email,
                password: password
            };
            
            localStorage.setItem("usuario", JSON.stringify(dados));

        });


    </script>

</body>
</html>
