<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>RegisterProgress</title>
</head>
<body>
    <main>
        <section class="header"> 
            <div class="image">
                <img src="imagens/logodef.png" alt="">
            </div>          
                <h1>Create your account</h1>
                <p>Enter your details to get started</p>
        </section>
        <form class="formulario" id="form">
            <div class="form-inps">
                <label for="usuario" class="obrigatorio" >User</label>
                <input type="text" id="user" placeholder="User">
            </div>
            <div class="form-inps">
                <label for="email" class="obrigatorio" >E-mail</label>
                <input type="text" id="email" placeholder="Enter E-mail">
            </div>
            <div class="form-inps">
                <label for="password" class="obrigatorio" >Password</label>
                <input type="password" id="password" placeholder=" Enter Password">
            </div>
            <div class="form-inps">
                <label for="confirmPassword" class="obrigatorio" >Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm Password">
            </div>
            <div class="btn-erro">
                <p id="erro"></p>
                <button type="submit" id="register-loginBtn">Register</button>
            </div>
            <div class="divider">
                <p>Or authorize with</p>
            </div>
            <button type="button" class="google"><i class="fa-brands fa-google"></i> Google</button>               
        </form>
        <section class="options">                   
            <div class="forgot-signup">
                <p>Already have an account? <a href="index.html">Log in</a></p>
            </div>
        </section>   
    </main>

    <script>

        const form = document.getElementById('form');
        const erro = document.getElementById('erro');

        form.addEventListener("submit", function(event){

            event.preventDefault();

            const user = document.getElementById('user').value;            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            document.getElementById('user').addEventListener('input', function(){
                erro.textContent = "";
            });
            document.getElementById('email').addEventListener('input', function(){
                erro.textContent = "";
            });
            document.getElementById('password').addEventListener('input', function(){
                erro.textContent = "";
            });
            document.getElementById('confirmPassword').addEventListener('input', function(){
                erro.textContent = ""
            })


            if (!user ||!email ||!password ){
                erro.textContent = "Preencha todos os campos corretamente!"
                return;
            }
            if (!email.includes("@") || !email.includes(".")){
                erro.textContent = "email invalido!"
                return;
            }
            if (password.length < 6){
                erro.textContent = "a senha precisa ter no minimo 6 caracteres!"               
                return;
            }
            if (password !== confirmPassword){
                erro.textContent = "as senhas nao coincidem!"
                return;
            }
            
            alert("usuario cadastrado")
            
            erro.textContent = "";

            const usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

            usuarios.push({ user, email, password });

            localStorage.setItem("usuarios", JSON.stringify(usuarios));

            window.location.href = "index.html"

        });


    </script>

</body>
</html>
