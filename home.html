<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <main>
        <h1 id="nomePerfil"></h1>
    </main>
    <script>

        const usuario = JSON.parse(localStorage.getItem("usuario"));

        if (usuario && usuario.user) {
            document.getElementById('nomePerfil').textContent = `bem-Vindo, ${usuario.user}!`;

        }else{
            document.getElementById('nomePerfil').textContent = "Bem-vindo"

        }

    </script>
</body>
</html>
